---
layout: default
---

<div id="product-config" style="display:none"
  data-us-diameter="{{ site.data.collar_config.standard_us_sleeve_diameter_mm }}"
  data-eu-diameter="{{ site.data.collar_config.standard_eu_sleeve_diameter_mm }}"
  data-outer-diameter="{{ site.data.collar_config.outer_diameter_mm }}"
  data-height-min="{{ site.data.collar_config.height_min_mm }}"
  data-height-max="{{ site.data.collar_config.height_max_mm }}"
  data-height-default="{{ site.data.collar_config.default_height_mm }}"
  data-worker-url="{{ site.worker_url }}"
></div>

{{ content }}

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Product",
  "name": "{{ page.product.name }}",
  "description": "{{ page.description }}",
  "image": [
    "{{ '/assets/img/adapter-1040.jpg' | absolute_url }}",
    "{{ '/assets/img/img-6587-1040.jpg' | absolute_url }}",
    "{{ '/assets/img/img-detail-1040.jpg' | absolute_url }}"
  ],
  "sku": "{{ page.product.sku }}",
  "brand": { "@type": "Brand", "name": "{{ site.title }}" }{% if page.product.low_price %},
  "offers": {
    "@type": "AggregateOffer",
    "priceCurrency": "{{ page.product.currency | default: 'CHF' }}",
    "lowPrice": "{{ page.product.low_price }}",
    "highPrice": "{{ page.product.high_price }}",{% if page.product.offer_count %}
    "offerCount": "{{ page.product.offer_count }}",{% endif %}
    "availability": "https://schema.org/InStock",
    "url": "{{ page.url | absolute_url }}"
  }{% endif %}
}
</script>

<script>
  if (typeof gtag === 'function') {
    gtag('event', 'view_item', {
      currency: 'CHF',
      items: [{
        item_name: document.title
      }]
    });
  }
</script>

<div class="snackbar" id="snackbar"></div>
