<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="{{ '/assets/logo.png' | relative_url }}" type="image/png">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QWQ9Z1NK24"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    var ga_config = {};
    if (window.location.hostname !== 'mitthen.com') {
      ga_config.debug_mode = true;
    }
    gtag('config', 'G-QWQ9Z1NK24', ga_config);
  </script>
</head>
<body>
  <header>
    <a href="{{ '/' | relative_url }}" class="brand">
      <img src="{{ '/assets/logo.png' | relative_url }}" alt="{{ site.title }} logo" class="brand-logo">
      {{ site.title }}
    </a>
    <button class="cart-icon-btn" id="cart-icon-btn" aria-label="Open cart">
      <svg class="cart-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <path d="M16 10a4 4 0 0 1-8 0"></path>
      </svg>
      <span class="cart-badge" id="cart-badge" hidden>0</span>
    </button>
  </header>
  <script>
    (function () {
      var CART_KEY = 'mitthen_cart';
      function get_count() {
        try {
          var items = JSON.parse(localStorage.getItem(CART_KEY)) || [];
          return items.reduce(function (s, i) { return s + i.quantity; }, 0);
        } catch (e) { return 0; }
      }
      function update_badge() {
        var badge = document.getElementById('cart-badge');
        if (!badge) return;
        var n = get_count();
        badge.textContent = n;
        if (n > 0) { badge.removeAttribute('hidden'); } else { badge.setAttribute('hidden', ''); }
      }
      // If the customer lands on the order-confirmed page, clear the cart.
      // This prevents stale items/counts if they retry checkout.
      var path = (window.location.pathname || '');
      if (/\/order-confirmed(\/|$)/.test(path)) {
        if (typeof gtag === 'function') {
          gtag('event', 'purchase', { event_category: 'ecommerce' });
        }
        try {
          localStorage.setItem(CART_KEY, JSON.stringify([]));
        } catch (e) {
          // ignore
        }
        window.dispatchEvent(new CustomEvent('mitthen:cart-updated'));
      }

      update_badge();
      window.addEventListener('mitthen:cart-updated', update_badge);
      window.addEventListener('storage', function (e) { if (e.key === CART_KEY) update_badge(); });
      document.getElementById('cart-icon-btn').addEventListener('click', function () {
        var drawer = document.querySelector('cart-drawer');
        if (drawer) { drawer.open(); }
      });
    })();
  </script>
  <div class="snackbar" id="snackbar"></div>
  <div id="product-config" style="display:none"
    data-us-diameter="{{ site.data.collar_config.standard_us_sleeve_diameter_mm }}"
    data-eu-diameter="{{ site.data.collar_config.standard_eu_sleeve_diameter_mm }}"
    data-outer-diameter="{{ site.data.collar_config.outer_diameter_mm }}"
    data-height-min="{{ site.data.collar_config.height_min_mm }}"
    data-height-max="{{ site.data.collar_config.height_max_mm }}"
    data-height-default="{{ site.data.collar_config.default_height_mm }}"
    data-worker-url="{{ site.worker_url }}"
  ></div>
  <cart-drawer></cart-drawer>
  <script src="{{ '/assets/product.js' | relative_url }}"></script>

  <main>
    {{ content }}
  </main>
  <footer>
    <p>© {{ site.time | date: "%Y" }} {{ site.title }}</p>
  </footer>
</body>
</html>
